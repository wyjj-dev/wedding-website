<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JIAHAO & VALERIE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mediaqueries.css">
</head>
<body>
    <section id="intro">
        <div class="top-container">
            <img src="./assets/SNAIL-BLUE.png" alt="snail-blue">
            <div class="header-text">
                <div>WE'RE GETTING MARRIED!</div>
                <div>REQUESTING PLEASURE OF YOUR COMPANY</div>
                <div>TO CELEBRATE OUR MARRIAGE WITH US</div>
            </div>
        </div>
        <div class="bottom-container">
            <div class="img-text-container">
                <img src="./assets/MAIN1.png" alt="main-1">
                <div class="name-year-container">
                    <div class="chi-name-text1">嘉壕.思俐</div>
                    <div class="chi-name-text2">2025</div>
                </div>
            </div>
        </div>
        <div class="top-container hidden-container">
            <div class="header-text">
                <div>⇣</div>
                <div>⇣</div>
                <div>⇣</div>
            </div>
            <img src="./assets/SNAIL-BLUE.png" alt="snail-blue">
        </div>
    </section>
    <section id="info">
        <div class="STD-loc-rsvp-container">
            <div class="STD-loc-container">
                <div class="STD-container">
                    <div class="STD-text">SAVE THE DATE</div>
                    <div class="pic">
                        <div class="STD-pic-container">
                            <img src="./assets/A1.png" alt="pic-1">
                            <img src="./assets/A2.png" alt="pic-2">
                            <img src="./assets/A3.png" alt="pic-3">
                        </div>
                    </div>
                </div>
                <div class="date-loc-container">
                    <div class="date-text">
                        <img src="./assets/SNAIL-BLUE.png" alt="snail-blue">
                        <div class="date-text">10 May 2025</div>
                    </div>
                    <div class="loc-text">
                        <img src="./assets/SNAIL-BLUE.png" alt="snail-blue">
                        <a href="https://maps.app.goo.gl/ZNL298UGyn8AYR3H9" target="_blank">
                            One&Only Desaru Coast, Malaysia
                        </a>
                    </div>
                </div>
            </div>
            <div class="timeline-rsvp-container">
                <div class="timeline-container">
                    <div class="timeline-center">
                        <div class="dot-text-container">
                            <div class="line"></div>
                            <div class="timeline-event">
                                <div class="big-dot"></div>
                                <div class="event-text">3.30PM</div>
                            </div>
                            <div class="timeline-event">
                                <div class="small-dot"></div>
                                <div class="event-text">RECEPTION<br>xx</div>
                            </div>
                            <div class="timeline-event">
                                <div class="small-dot"></div>
                                <div class="event-text">CEREMONY<br>xx</div>
                            </div>
                            <div class="timeline-event">
                                <div class="small-dot"></div>
                                <div class="red-text">WEDDING BANQUET<br>xx</div>
                            </div>
                            <div class="timeline-event">
                                <div class="big-dot"></div>
                                <div class="event-text">till late</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="rsvp-container">
                    <div class="rsvp-text-container">
                        <div class="rsvp-text-1">
                            <a href="https://withjoy.com/jiahao-and-valerie/rsvp" target="_blank">
                                囍
                            </a>
                        </div>
                        <div class="rsvp-text-2">
                            <a href="https://withjoy.com/jiahao-and-valerie/rsvp" target="_blank">
                                RSVP HERE
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
